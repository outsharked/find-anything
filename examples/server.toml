# find-server configuration
# Copy to server.toml and fill in your values.

[server]
# Address to listen on. Inside Docker, bind to 0.0.0.0 so the port is reachable.
# For local use only, prefer 127.0.0.1 to avoid exposing the server on the network.
bind = "0.0.0.0:8765"

# Path where the index database and content archives are stored.
# When running in Docker this should be /data (mounted volume).
data_dir = "/home/user/.local/share/find-anything"

# Bearer token required by all API requests.
# Generate one with: openssl rand -hex 32
token = "change-me"

# Per-source filesystem roots (optional).
# When a source has a path configured, the server can serve original files via
# GET /api/v1/raw, enabling inline image display and direct file downloads in
# the web UI.
#
# [sources.my-source]
# path = "/mnt/nas/my-source"

[search]
# Default number of results per query when the client does not specify a limit.
default_limit = 50

# Maximum number of results returned per query (hard cap).
max_limit = 500

# Number of FTS5 candidates evaluated per source before scoring.
# Increase for more thorough results at the cost of higher latency.
fts_candidate_limit = 2000

# ── Text normalization ────────────────────────────────────────────────────────
# The server normalizes text content before writing it to the index.
# Built-in: JSON and TOML are always pretty-printed.
# External formatters below are tried in order; first match that exits 0 wins.
# Any line still exceeding max_line_length is word-wrapped as a final step.
# Markdown files are excluded (line structure is semantically meaningful).

[normalization]
max_line_length = 120 # Wrap lines longer than this (0 = disable)

# Biome — fast Rust-based formatter for JS/TS/CSS/JSON (no Node required).
# https://biomejs.dev/guides/manual-installation/
#
[[normalization.formatters]]
path = "/usr/local/bin/biome"
extensions = ["js", "ts", "jsx", "tsx", "css", "graphql", "json", "jsonc"]
args = ["format", "--stdin-file-path", "{name}", "-"]

# rustfmt — Rust formatter, bundled with rustup.
# rustup component add rustfmt
#
# [[normalization.formatters]]
# path       = "/home/user/.cargo/bin/rustfmt"
# extensions = ["rs"]
# args       = ["--edition", "2021"]

# gofmt — Go formatter, bundled with the Go toolchain.
# https://go.dev/doc/install
#
# [[normalization.formatters]]
# path       = "/usr/local/go/bin/gofmt"
# extensions = ["go"]
# args       = []

# ruff — fast Python formatter.
# https://docs.astral.sh/ruff/installation/
#
# [[normalization.formatters]]
# path       = "/usr/local/bin/ruff"
# extensions = ["py", "pyi"]
# args       = ["format", "--stdin-filename", "{name}", "-"]

# Prettier — covers HTML, Vue, Svelte, YAML, SCSS, and more.
# https://prettier.io/docs/en/install.html
#
[[normalization.formatters]]
path = "/home/jamiet/.local/share/pnpm/prettier"
extensions = ["html", "vue", "svelte", "scss", "less", "yaml", "yml"]
args = ["--stdin-filepath", "{name}"]

# ── Compaction ────────────────────────────────────────────────────────────────
# find-server accumulates orphaned chunks in ZIP archives over time as files are
# deleted or re-indexed. Compaction rewrites archives to reclaim that space.
# A scan runs at startup (after 30 s) and then daily at `start_time`.
# Compaction only runs if orphaned data exceeds `threshold_pct` percent of total.

# [compaction]
# threshold_pct = 10.0   # Run compaction when ≥ this % of archive bytes are orphaned
# start_time    = "02:00" # Local time (HH:MM) for the daily scan/compact run
