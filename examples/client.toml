[server]
url = "http://127.0.0.1:8765"
token = "local-dev-token-abc123"

# Multiple sources can be defined, each with a unique name
[[sources]]
name = "code"
path = "/home/user/code"
# Optional: base URL for constructing resource links in search results
base_url = "file:///home/user/code"

[[sources]]
name = "data"
path = "/home/user/data"
# base_url can use any protocol: file://, http://, https://, smb://, etc.
# base_url = "https://github.com/owner/repo/blob/main"
# Optional: only index files matching these glob patterns (forward slashes).
# include = ["reports/**", "exports/**"]

[scan]
exclude = [
    "**/.git/**",
    "**/node_modules/**",
    "**/target/**",
    "**/__pycache__/**",
    "**/.next/**",
    "**/dist/**",
    "**/.cache/**",
    "**/.tox/**",
    "**/.venv/**",
    "**/venv/**",
    "**/*.pyc",
    "**/*.class",
    "**/tmp/**",
    "**/temp/**",
]
# Additional patterns appended to the built-in defaults (without replacing them).
# Use this instead of `exclude` when you want to keep the defaults and just add more.
exclude_extra = []
max_file_size_mb = 10
follow_symlinks = false
include_hidden = false

