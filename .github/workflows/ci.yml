name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test & Lint (Rust)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Create web/build stub
        run: mkdir -p web/build

      - name: Build
        run: cargo build --workspace

      - name: Test (lib)
        run: cargo test --workspace --lib -- --test-threads=1

      - name: Test (integration)
        run: cargo test --workspace --tests

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  build-windows:
    name: Build check (Windows x86_64)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: windows-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-x86_64-cargo-

      - name: Create web/build stub
        run: mkdir -p web/build

      - name: Build (Windows)
        run: cargo build --workspace --target x86_64-pc-windows-msvc

  web:
    name: Type-check (Web)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install dependencies
        run: pnpm install
        working-directory: web

      - name: Type-check
        run: pnpm run check
        working-directory: web

      - name: Test
        run: pnpm test --run
        working-directory: web

      - name: Build
        run: pnpm run build
        working-directory: web

  ci:
    name: CI
    needs: [test, build-windows, web]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
