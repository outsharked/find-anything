[tools]
node = "24"
pnpm = "10.29.3"
"cargo:cargo-watch" = "latest"
"cargo:cargo-llvm-cov" = "latest"

[settings]
experimental = true # Enables hook support

[env]
# Optional: Adds node_modules/.bin to PATH for easier command running
_.path = ["./node_modules/.bin", "~/.cargo/bin"]

# Optional: Set up a task to install dependencies
[tasks.install]
description = "Install dependencies"
run = "pnpm install"
sources = ["pnpm-lock.yaml", "package.json"]
outputs = ["node_modules"]

# ── Rust server ───────────────────────────────────────────────────────────────

[tasks.server]
description = "Start the Rust API server, auto-rebuild on source changes (requires cargo-watch)"
run = "cargo watch -w crates -x 'run -p find-server -- --config config/server.toml'"

[tasks.server-once]
description = "Start the Rust API server (single run, no watching)"
run = "cargo run -p find-server --bin find-server -- --config config/server.toml"

[tasks.dev]
description = "Start Rust API + Vite dev server (full dev environment with live reload)"
run = """
mkdir -p web/build
# setsid puts cargo-watch in its own process group so that
# "kill -TERM -$API_PID" reaches cargo-watch AND all its children
# (cargo run, find-server).  Without this, kill only hits cargo-watch
# and find-server keeps running, holding port 8765.
RUST_LOG=debug setsid cargo watch -w crates -x 'run -p find-server --bin find-server -- --config config/server.toml' &
API_PID=$!
trap "kill -TERM -$API_PID 2>/dev/null" EXIT INT TERM
pnpm --dir web dev
"""

# ── Client / scanning ─────────────────────────────────────────────────────────

[tasks.scan]
description = "Incremental scan of all configured sources"
run = [
  "cargo build --workspace",
  "cargo run -p find-client --bin find-scan -- --config config/client.toml",
]

[tasks.scan-upgrade]
description = "Upgrade scan of all configured sources (rescans anything scanned with older version of find-scan)"
run = [
  "cargo build --workspace",
  "cargo run -p find-client --bin find-scan -- --config config/client.toml --upgrade",
]

[tasks.build]
description = "Build all binaries for x86_64 Linux (server and client)"
run = [
  "rm -rf web/build",
  "pnpm --dir web run build",
  "cargo build --release --workspace",
]

[tasks.build.env]
GIT_HASH = "{{exec(command='git rev-parse --short HEAD')}}"
GIT_TAG = "{{exec(command='git tag --points-at HEAD 2>/dev/null | head -1')}}"
GIT_DIRTY = "{{exec(command='git status --porcelain 2>/dev/null | head -1')}}"

[tasks.build-arm]
description = "Build all binaries for ARM7 NAS using cross (matches CI, avoids glibc version mismatch)"
run = [
  "rm -rf web/build",
  "pnpm --dir web run build",
  "cross build --release --target armv7-unknown-linux-gnueabihf",
]

[tasks.build-arm.env]
GIT_HASH = "{{exec(command='git rev-parse --short HEAD')}}"
GIT_TAG = "{{exec(command='git tag --points-at HEAD 2>/dev/null | head -1')}}"
GIT_DIRTY = "{{exec(command='git status --porcelain 2>/dev/null | head -1')}}"

[tasks.build-linux]
description = "Build all Linux release artifacts: x86_64 server and ARM7 NAS binaries"
depends = ["build", "build-arm"]

[tasks.build-win]
description = "Cross-compile Windows binaries only (no installer) - this is for development"
run = [
  "rm -rf web/build",
  "pnpm --dir web run build",
  "cross build --release --target x86_64-pc-windows-gnu",
]

[tasks.build-win.env]
GIT_HASH = "{{exec(command='git rev-parse --short HEAD')}}"
GIT_TAG = "{{exec(command='git tag --points-at HEAD 2>/dev/null | head -1')}}"
GIT_DIRTY = "{{exec(command='git status --porcelain 2>/dev/null | head -1')}}"

[tasks.build-wsl-cross]
description = "Cross-compile Windows binaries via Docker/mingw and package with Inno Setup"
run = "bash install/build-wsl-cross.sh"

[tasks.build-wsl-cross.env]
GIT_HASH = "{{exec(command='git rev-parse --short HEAD')}}"
GIT_TAG = "{{exec(command='git tag --points-at HEAD 2>/dev/null | head -1')}}"
GIT_DIRTY = "{{exec(command='git status --porcelain 2>/dev/null | head -1')}}"

# ── Checks ────────────────────────────────────────────────────────────────────

[tasks.test]
description = "Run all Rust tests (unit + integration)"
run = "cargo test --workspace"

[tasks.check]
description = "Type-check all Rust crates and the web UI"
run = ["cargo check --workspace", "pnpm --dir web check"]

[tasks.clippy]
description = "Run clippy lints (matches CI — fails on warnings)"
run = "cargo clippy --workspace -- -D warnings"

[tasks.coverage]
description = "Generate HTML test coverage report → target/llvm-cov/html/index.html (requires: rustup component add llvm-tools)"
run = "cargo llvm-cov --workspace --html && echo 'Report: target/llvm-cov/html/index.html'"


# ── Admin ─────────────────────────────────────────────────────────────────────

[tasks.admin]
description = "Show inbox status (pending and failed files)"
run = "cargo run -p find-client --bin find-admin -- --config config/client.toml"

[tasks.bench-storage]
description = "Benchmark content store backends (stop find-server first — find-test opens store files directly)"
run = [
  "cargo build -p find-server --bin find-test",
  "cargo run -p find-server --bin find-test -- bench-storage --config config/server.toml --concurrency 1 --concurrency 4 --concurrency 16",
]

# ── Database management ───────────────────────────────────────────────────────

[tasks.clean-db]
description = "Delete all databases and content archives (requires re-scan)"
run = """
set -e
DATA_DIR="${XDG_DATA_HOME:-$HOME/.local/share}/find-anything"
if [ -d "$DATA_DIR" ]; then
  echo "Deleting: $DATA_DIR"
  rm -rf "$DATA_DIR"
  echo "✓ Database and content archives deleted"
  echo "Run 'mise scan' or 'mise scan-full' to rebuild the index"
else
  echo "No data directory found at: $DATA_DIR"
fi
"""
